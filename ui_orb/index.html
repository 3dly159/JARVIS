<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>J.A.R.V.I.S</title>
 <link rel="stylesheet" href="styles/jarvis.css">
 <link rel="icon"
 href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
</head>

<body>
 <!-- Neural Boot Overlay -->
 <div id="bootOverlay" class="boot-overlay visible">
 <div class="boot-content">
 <div class="boot-glitch" data-text="SYSTEM BOOTING">SYSTEM BOOTING</div>
 <div class="boot-status" id="bootStatus">INITIALIZING NEURAL CORES...</div>
 <div class="boot-progress-container">
 <div id="bootProgress" class="boot-progress"></div>
 </div>
 <div class="boot-specs">
 <span id="bootEngine">READYING STT/TTS</span>
 <span class="boot-version">v3.7-NEURAL</span>
 </div>
 </div>
 </div>

 <!-- Top bar: minimal chrome -->
 <div class="topbar">
 <div class="topbar-logo">◆ F.R.I.D.A.Y</div>
 <div class="topbar-right">
 <div class="connection-dot" id="connectionDot" title="Connection Status"></div>
 <span class="connection-label" id="connectionLabel">OFFLINE</span>
 <button class="icon-btn" id="fullscreenBtn" title="Toggle Fullscreen">⛶</button>
 <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
 </div>
 </div>
 <!-- Orb Canvas: the main interactive element -->
 <canvas id="orbCanvas"></canvas>

 <!-- State label below orb -->
 <div class="orb-status" id="orbStatus">SAY "HEY FRIDAY" TO BEGIN</div>

 <!-- Conversation transcript at bottom -->
 <div class="transcript-panel" id="transcriptPanel">
 <div class="transcript-inner" id="transcriptInner">
 <div class="transcript-welcome">
 <span class="t-jarvis">F.R.I.D.A.Y</span> — All systems operational. Say <em>"Hey Friday"</em> to begin, sir.
 </div>
 </div>
 </div>

 <!-- Settings Modal (preserved exactly) -->
 <div class="modal-overlay" id="settingsModal">
 <div class="modal">
 <div class="modal-header">
 <span>⚙ SYSTEM CONFIGURATION</span>
 <button class="modal-close" id="closeSettings">✕</button>
 </div>
 <div class="modal-body">
 <div class="form-group">
 <label>GATEWAY URL</label>
 <input type="text" id="configGatewayUrl" placeholder="ws://localhost:18789" />
 </div>
 <div class="form-group">
 <label>SETUP CODE</label>
 <input type="text" id="configSetupCode" placeholder="paste from openclaw qr --json" />
 </div>
 <div class="form-group">
 <label>TTS MODEL</label>
 <select id="configTtsModel">
 <option value="tts_models/multilingual/multi-dataset/xtts_v2">XTTS v2 (Voice Clone — Recommended)</option>
 <option value="tts_models/en/vctk/vits">VCTK VITS (Fast, British)</option>
 <option value="tts_models/en/ljspeech/tacotron2-DDC">Tacotron2 DDC (Fast, American)</option>
 <option value="tts_models/en/ljspeech/glow-tts">GlowTTS (Fast, American)</option>
 </select>
 </div>
 <div class="form-group">
 <label>REFERENCE VOICE PATH (XTTS v2, server path)</label>
 <input type="text" id="configReferenceWav" placeholder="C:\path\to\jarvis_reference.wav" />
 </div>
 <div class="form-group vctk-only" style="display: none;">
 <label>SPEAKER (VCTK only)</label>
 <select id="configTtsSpeaker">
 <optgroup label="— Recommended —">
 <option value="p314">p314 — Authority (Deep / JARVIS-like)</option>
 <option value="p273">p273 — Deep Male</option>
 <option value="p326">p326 — Professional Female</option>
 <option value="p245">p245 — Clear Male</option>
 </optgroup>
 <optgroup label="— All Speakers —">
 <option value="p225">p225</option>
 <option value="p226">p226</option>
 <option value="p227">p227</option>
 <option value="p228">p228</option>
 <option value="p229">p229</option>
 <option value="p230">p230</option>
 <option value="p231">p231</option>
 <option value="p232">p232</option>
 <option value="p233">p233</option>
 <option value="p234">p234</option>
 <option value="p235">p235</option>
 <option value="p236">p236</option>
 <option value="p237">p237</option>
 <option value="p238">p238</option>
 <option value="p239">p239</option>
 <option value="p240">p240</option>
 <option value="p241">p241</option>
 <option value="p242">p242</option>
 <option value="p243">p243</option
